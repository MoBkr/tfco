<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECIT - خدمة العملاء الذكية</title>
    <style>
        /* CSS Reset & Variables */
        :root {
            --bg-color: #0f172a;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --chat-user: #3b82f6;
            --chat-bot: #1e293b;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        header {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        /* Header Actions */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .settings-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .settings-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
        }

        .settings-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 0.25rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.3);
        }

        .tab-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 1rem;
            border-radius: 1rem;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-start;
            background-color: var(--chat-user);
            border-top-right-radius: 0;
        }

        .message.bot {
            align-self: flex-end;
            background-color: var(--chat-bot);
            border-top-left-radius: 0;
            border: 1px solid var(--glass-border);
        }

        /* Markdown Styles in Bot Message */
        .message.bot h1, .message.bot h2, .message.bot h3 { margin-bottom: 0.5rem; font-weight: bold; }
        .message.bot p { margin-bottom: 0.5rem; }
        .message.bot p:last-child { margin-bottom: 0; }
        .message.bot ul, .message.bot ol { margin-right: 1.5rem; margin-bottom: 0.5rem; }
        .message.bot strong { font-weight: bold; color: #fff; }
        .message.bot code { background: rgba(0,0,0,0.3); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; }
        .message.bot pre { background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 0.5rem; direction: ltr; text-align: left; }
        .message.bot pre code { background: transparent; padding: 0; }

        /* Input Area (Text) */
        .input-area {
            padding: 1rem 1.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .input-area.hidden {
            display: none;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.8rem 1.2rem;
            border-radius: 2rem;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .send-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .send-btn:hover {
            background: var(--primary-hover);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transform: rotate(180deg); /* RTL adjustment for send icon */
        }

        /* Voice Area */
        .voice-area {
            padding: 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            transition: all 0.3s ease;
        }

        .voice-area.hidden {
            display: none;
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary-color);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
            position: relative;
        }

        .mic-btn svg {
            width: 35px;
            height: 35px;
            fill: currentColor;
            z-index: 2;
        }

        .mic-btn.recording {
            background: #ef4444;
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .voice-status {
            font-size: 0.9rem;
            color: var(--text-muted);
            min-height: 1.5rem;
        }

        /* Loading Indicator */
        .typing-indicator {
            display: flex;
            gap: 0.3rem;
            padding: 1rem;
            background: var(--chat-bot);
            border-radius: 1rem;
            border-top-left-radius: 0;
            align-self: flex-end;
            width: fit-content;
            border: 1px solid var(--glass-border);
        }

        .typing-indicator.hidden {
            display: none;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            width: 90%;
            max-width: 400px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .modal-overlay.hidden .modal-content {
            transform: translateY(20px);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }

        .modal-header h3 {
            font-size: 1.2rem;
            color: var(--text-main);
        }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: var(--text-main);
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .setting-group label {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .setting-group select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.8rem;
            border-radius: 0.5rem;
            outline: none;
            font-size: 1rem;
            cursor: pointer;
        }

        .setting-group select:focus {
            border-color: var(--primary-color);
        }
        
        .setting-group select option {
            background: var(--bg-color);
            color: var(--text-main);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 0.8rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--bg-color);
            border-top: 1px solid var(--glass-border);
        }

        /* Responsive */
        @media (max-width: 600px) {
            header { padding: 1rem; flex-direction: column; gap: 1rem; }
            .message { max-width: 90%; }
        }
    </style>
</head>

6. تصميم وتطوير المواقع
7. تطبيقات الجوال

9. تطوير الأنظمة الكبيرة والصغيرة
10. خدمات الأمن السيبراني
11. حماية البيانات والمعلومات

═══════════════════════════════════
٥. منتجات ECIT الخاصة
═══════════════════════════════════

- ERP — نظام تخطيط موارد المؤسسات
- CRM — نظام إدارة علاقات العملاء
- PMO — نظام إدارة المشاريع
- LMS — نظام إدارة التعلم
- TASK — نظام إدارة وتتبع المهام
- لجاني (Lajani) — نظام تنظيم اللجان والاجتماعات

═══════════════════════════════════
٦. خدمات التسويق الرقمي (8 خدمات)

1. التسويق الرقمي الشامل
2. إعلانات الدفع بالنقرة (PPC)
3. تحسين معدل التحويل (CRO)
4. إدارة علاقات العملاء (CRM)
5. تطوير المواقع
6. تحسين محركات البحث (SEO)

٧. المشاريع المنفذة (الشراكات الاستراتيجية)
═══════════════════════════════════

- واسطة (WASTA): تطبيق ذكي يربط المستخدمين بأفضل العروض والخصومات في التسوق والمطاعم والكافيهات والترفيه
- منصة القانون: بوابة قانونية سعودية متخصصة في خدمات المحاماة والاستشارات القانونية
- حلول بيئتي (My Environment Solutions): منصة وساطة وتسويق سعودية متخصصة في إدارة الحاويات والنفايات
- مجموعة المستقبل التعليمية: منصة تعليمية سعودية تقدم برامج أكاديمية متقدمة عبر التعلم الإلكتروني
- مستواك (Mustawak): نظام تعلم إلكتروني شامل (موقع + تطبيق) لإدارة المدارس بالكامل، يشمل الإداريين والمعلمين والطلاب وأولياء الأمور مع نظام مكافآت بالنقاط
- استحواذ (Istehwath): منصة تربط البائعين بالمستثمرين ورواد الأعمال لشراء المشاريع والأفكار التجارية
- المنصة الرقمية للإعلانات: نظام إنشاء ومشاركة محتوى إعلاني تفاعلي مع محفظة رقمية ونظام نقاط
- FityDiet: منصة حلول غذائية مخصصة مع خطط وجبات ودفع إلكتروني
- Ziad Art: متجر إلكتروني متخصص في بيع الأعمال الفنية والتصاميم الإبداعية

١٠. قواعد صارمة
═══════════════════════════════════

- تحدث بالعربية دائماً إلا إذا تحدث العميل بالإنجليزية
- لا تختلق معلومات غير موجودة في هذا الملف — إذا لم تعرف الإجابة قل: "للحصول على تفاصيل أدق، أنصحك بالتواصل مع فريقنا مباشرة"

- لا تقارن ECIT بمنافسين ولا تذكر أسماء شركات منافسة

- استخدم نبرة ودية ومهنية تعكس هوية ECIT
- في نهاية كل إجابة عن خدمة أو منتج، اسأل: "هل تحب تعرف أكثر عن هذي الخدمة؟ أو عندك استفسار ثاني؟"
- عند الترحيب: "أهلاً بك في ECIT — خبراء تقنية المعلومات! كيف أقدر أساعدك اليوم؟"

        let textChatSession = ai.chats.create({
            model: "gemini-2.5-flash",
            config: {
                systemInstruction: ECIT_SYSTEM_PROMPT,
            }
        });

        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const typingIndicator = document.getElementById('typing-indicator');
        const textInput = document.getElementById('text-input');
        const inputArea = document.getElementById('input-area');
        const voiceArea = document.getElementById('voice-area');
        const tabText = document.getElementById('tab-text');
        const tabVoice = document.getElementById('tab-voice');
        const micBtn = document.getElementById('mic-btn');
        const voiceStatus = document.getElementById('voice-status');
        const settingsModal = document.getElementById('settings-modal');
        const voiceSelect = document.getElementById('voice-select');

        // Attach to window for inline event handlers (bridged via pre-module script)
        window._switchMode = switchMode;
        window._handleKeyPress = handleKeyPress;
        window._sendTextMessage = sendTextMessage;
        window._toggleRecording = toggleRecording;
        window._openSettings = openSettings;
        window._closeSettings = closeSettings;
        window._saveVoiceSelection = saveVoiceSelection;

        // Initialize
        window.onload = () => {
            addMessage('أهلاً بك في ECIT! كيف يمكنني مساعدتك اليوم؟', 'bot');
            populateVoiceList();
        };

        // UI Functions
        function openSettings() {
            settingsModal.classList.remove('hidden');
        }

        function closeSettings(e) {
            if (e && e.target !== settingsModal && e.target.className !== 'close-btn') return;
            settingsModal.classList.add('hidden');
        }

        function populateVoiceList() {
            voiceSelect.innerHTML = `
                <option value="Orus" selected>Orus (رجالي - يوصى به)</option>
                <option value="Kore">Kore (أنثوي)</option>
                <option value="Puck">Puck (رجالي)</option>
                <option value="Zephyr">Zephyr (رجالي)</option>
                <option value="Aoede">Aoede (أنثوي)</option>
            `;
        }

        function saveVoiceSelection() {
            // Voice is read directly from the select element when starting the session
        }

        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'text') {
                tabText.classList.add('active');
                tabVoice.classList.remove('active');
                inputArea.classList.remove('hidden');
                voiceArea.classList.add('hidden');
                textInput.focus();
                if (isRecording) stopGeminiLive();
            } else {
                tabVoice.classList.add('active');
                tabText.classList.remove('active');
                voiceArea.classList.remove('hidden');
                inputArea.classList.add('hidden');
            }
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            chatContainer.appendChild(typingIndicator);
            typingIndicator.classList.remove('hidden');
            scrollToBottom();
        }

        function hideTyping() {
            typingIndicator.classList.add('hidden');
        }

        // Simple Markdown Parser
        function parseMarkdown(text) {
            if (!text) return '';
            let html = text
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*)\*/gim, '<em>$1</em>')
                .replace(/`(.*?)`/gim, '<code>$1</code>')
                .replace(/```([\s\S]*?)```/gim, '<pre><code>$1</code></pre>')
                .replace(/\n/gim, '<br>');
            
            html = html.replace(/^\* (.*$)/gim, '<ul><li>$1</li></ul>');
            html = html.replace(/<\/ul><br><ul>/gim, '');
            
            return html;
        }

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            
            if (sender === 'bot') {
                msgDiv.innerHTML = parseMarkdown(text);
            } else {
                msgDiv.textContent = text;
            }
            
            chatContainer.insertBefore(msgDiv, typingIndicator);
            scrollToBottom();
        }

        // Text Chat Logic (Gemini API)
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendTextMessage();
            }
        }

        async function sendTextMessage() {
            const text = textInput.value.trim();
            if (!text) return;

            textInput.value = '';
            addMessage(text, 'user');
            
            showTyping();
            try {
                const response = await textChatSession.sendMessage({ message: text });
                hideTyping();
                addMessage(response.text, 'bot');
            } catch (error) {
                console.error('Chat error:', error);
                hideTyping();
                addMessage("عذراً، حدث خطأ في الاتصال بالخادم. يرجى المحاولة مرة أخرى.", 'bot');
            }
        }

        // Voice Chat Logic (Gemini Live API)
        async function toggleRecording() {
            if (isRecording) {
                stopGeminiLive();
            } else {
                startGeminiLive();
            }
        }

        let sessionReady = false;
        let audioSource = null;
        let ws = null;
        const API_KEY = 'AIzaSyC1SfZxY27LxgmoUUAdylJdbq86sA8CvTQ';
        const LIVE_API_URL = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${API_KEY}`;

        async function startGeminiLive() {
            try {
                micBtn.classList.add('recording');
                voiceStatus.textContent = 'جاري الاتصال...';
                isRecording = true;
                sessionReady = false;

                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                // 1. Get microphone
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } });
                voiceStatus.textContent = 'تم فتح الميكروفون...';

                // 2. Register AudioWorklet (once)
                if (!workletRegistered) {
                    const workletCode = `
                    class PCMProcessor extends AudioWorkletProcessor {
                        process(inputs, outputs, parameters) {
                            const input = inputs[0];
                            if (input && input.length > 0) {
                                const channelData = input[0];
                                const pcm16 = new Int16Array(channelData.length);
                                for (let i = 0; i < channelData.length; i++) {
                                    pcm16[i] = Math.max(-1, Math.min(1, channelData[i])) * 32767;
                                }
                                this.port.postMessage(pcm16.buffer, [pcm16.buffer]);
                            }
                            return true;
                        }
                    }
                    registerProcessor('pcm-processor', PCMProcessor);
                    `;
                    const blob = new Blob([workletCode], { type: 'application/javascript' });
                    const workletUrl = URL.createObjectURL(blob);
                    await audioContext.audioWorklet.addModule(workletUrl);
                    workletRegistered = true;
                }

                // 3. Connect WebSocket directly to Gemini Live API
                voiceStatus.textContent = 'جاري الاتصال بالذكاء الاصطناعي...';
                const voiceName = voiceSelect.value || 'Orus';

                await new Promise((resolve, reject) => {
                    ws = new WebSocket(LIVE_API_URL);

                    ws.onopen = () => {
                        console.log("WebSocket connected, sending setup...");
                        // Send setup message
                        ws.send(JSON.stringify({
                            setup: {
                                model: "models/gemini-2.5-flash-native-audio-latest",
                                generationConfig: {
                                    responseModalities: ["AUDIO"],
                                    speechConfig: {
                                        voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } }
                                    },
                                    thinkingConfig: { thinkingBudget: 0 }
                                },
                                systemInstruction: { parts: [{ text: ECIT_SYSTEM_PROMPT }] }
                            }
                        }));
                    };

                    ws.onmessage = async (event) => {
                        try {
                            // Gemini returns Blob, convert to text first
                            let text;
                            if (event.data instanceof Blob) {
                                text = await event.data.text();
                            } else {
                                text = event.data;
                            }
                            const msg = JSON.parse(text);

                            // Setup complete
                            if (msg.setupComplete) {
                                console.log("Gemini Live setup complete!");
                                sessionReady = true;
                                voiceStatus.textContent = 'تحدث الآن... (مباشر)';
                                resolve();
                                return;
                            }

                            // Audio response
                            if (msg.serverContent?.modelTurn?.parts) {
                                for (const part of msg.serverContent.modelTurn.parts) {
                                    // Play audio
                                    if (part.inlineData?.data) {
                                        playAudio(part.inlineData.data);
                                    }
                                    // Only show text if it's NOT thinking (skip thought parts)
                                    if (part.text && !part.thought) {
                                        addMessage(part.text, 'bot');
                                    }
                                }
                            }

                            // Interruption
                            if (msg.serverContent?.interrupted) {
                                nextPlayTime = audioContext.currentTime;
                            }
                        } catch (err) {
                            console.error("Parse error:", err, event.data);
                        }
                    };

                    ws.onclose = (event) => {
                        console.log("WebSocket closed:", event.code, event.reason);
                        sessionReady = false;
                        if (isRecording) stopGeminiLive();
                    };

                    ws.onerror = (err) => {
                        console.error("WebSocket error:", err);
                        sessionReady = false;
                        reject(new Error('فشل الاتصال بالخادم'));
                    };

                    // Timeout after 10 seconds
                    setTimeout(() => {
                        if (!sessionReady) reject(new Error('انتهت مهلة الاتصال'));
                    }, 10000);
                });

                // 4. Connect audio pipeline AFTER session is ready
                audioSource = audioContext.createMediaStreamSource(mediaStream);
                workletNode = new AudioWorkletNode(audioContext, 'pcm-processor');

                workletNode.port.onmessage = (e) => {
                    if (ws && ws.readyState === WebSocket.OPEN && sessionReady) {
                        try {
                            const pcm16 = new Int16Array(e.data);
                            const uint8 = new Uint8Array(pcm16.buffer);
                            let binary = '';
                            for (let i = 0; i < uint8.length; i++) {
                                binary += String.fromCharCode(uint8[i]);
                            }
                            const base64 = btoa(binary);
                            ws.send(JSON.stringify({
                                realtimeInput: {
                                    mediaChunks: [{ data: base64, mimeType: 'audio/pcm;rate=16000' }]
                                }
                            }));
                        } catch (err) {
                            // Ignore send errors
                        }
                    }
                };

                audioSource.connect(workletNode);

            } catch (error) {
                console.error("Error starting Gemini Live:", error);
                voiceStatus.textContent = 'خطأ: ' + (error.message || error);
                stopGeminiLive();
            }
        }

        function stopGeminiLive() {
            isRecording = false;
            sessionReady = false;
            micBtn.classList.remove('recording');
            voiceStatus.textContent = 'اضغط للتحدث';

            // Disconnect audio first
            if (workletNode) {
                workletNode.disconnect();
                workletNode = null;
            }
            if (audioSource) {
                audioSource.disconnect();
                audioSource = null;
            }
            // Then close WebSocket
            if (ws) {
                try { ws.close(); } catch(e) {}
                ws = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
        }

        function playAudio(base64Audio) {
            if (!audioContext) return;
            const binaryString = atob(base64Audio);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            const pcm16 = new Int16Array(bytes.buffer);
            const float32 = new Float32Array(pcm16.length);
            for (let i = 0; i < pcm16.length; i++) {
                float32[i] = pcm16[i] / 32768;
            }
            
            const audioBuffer = audioContext.createBuffer(1, float32.length, 24000);
            audioBuffer.getChannelData(0).set(float32);
            
            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioContext.destination);
            
            if (nextPlayTime < audioContext.currentTime) {
                nextPlayTime = audioContext.currentTime;
            }
            source.start(nextPlayTime);
            nextPlayTime += audioBuffer.duration;
        }
